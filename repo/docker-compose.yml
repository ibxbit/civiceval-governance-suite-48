services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eaglepoint
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      ENABLE_SEED_ADMIN: ${ENABLE_SEED_ADMIN:-false}
      SEED_ADMIN_PASSWORD_HASH: ${SEED_ADMIN_PASSWORD_HASH:-}
    volumes:
      - type: bind
        source: ${ENCRYPTED_POSTGRES_PATH:?Set ENCRYPTED_POSTGRES_PATH to an encrypted host directory}
        target: /var/lib/postgresql/data
      - ./database/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d eaglepoint"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://app_user:${POSTGRES_PASSWORD}@database:5432/eaglepoint
      CORS_ORIGIN: https://${PUBLIC_HOSTNAME:-localhost}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a 32+ character secret}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - type: bind
        source: ${ENCRYPTED_CMS_STORAGE_PATH:?Set ENCRYPTED_CMS_STORAGE_PATH to an encrypted host directory}
        target: /app/storage/private

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_PATH:?Set TLS_CERT_PATH to your TLS certificate file}:/etc/nginx/tls/server.crt:ro
      - ${TLS_KEY_PATH:?Set TLS_KEY_PATH to your TLS private key file}:/etc/nginx/tls/server.key:ro
